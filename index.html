<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyMatch — Piano Settings Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ───────────────────────────────────────────────────- */
:root {
  --navy:       #0d0f1a;
  --navy-2:     #111422;
  --navy-3:     #161928;
  --amber:      #f5a623;
  --amber-dim:  #a06b0f;
  --amber-pale: #ffd98a;
  --warm-white: #f0ead8;
  --grey:       #8a8a96;
  --grey-2:     #5a5a68;
  --grey-3:     #2e2e3e;
  --error:      #e05555;
  --success:    #4db87a;
  /* FIX 4 — upgraded expressive typography */
  --f-head: 'Playfair Display', Georgia, serif;
  --f-body: 'Space Grotesk', system-ui, sans-serif;
  --ease:   cubic-bezier(0.76, 0, 0.24, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--navy); color:var(--warm-white); font-family:var(--f-body); font-weight:300; -webkit-font-smoothing:antialiased; }

/* ── BACKGROUND ─────────────────────────────────────────────── */
#bg { position:fixed; inset:0; z-index:0; pointer-events:none; }
#bg-base {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 15% 20%, rgba(245,166,35,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 80%, rgba(245,166,35,0.04) 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, var(--navy-2) 0%, var(--navy) 100%);
}
#bg-grid {
  position:absolute; inset:0;
  background-image: linear-gradient(rgba(245,166,35,0.022) 1px,transparent 1px), linear-gradient(90deg,rgba(245,166,35,0.022) 1px,transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
}
#bg-vignette { position:absolute; inset:0; background:radial-gradient(ellipse 120% 120% at 50% 50%, transparent 30%, rgba(5,7,14,0.94) 100%); }
#bg-noise { position:absolute; inset:0; opacity:0.04; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

/* ── SCENES ─────────────────────────────────────────────────── */
#stage { position:fixed; inset:0; z-index:1; }
.scene {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
}
.scene.active { opacity:1; pointer-events:all; }
.scene.entering { animation: sIn  420ms var(--ease) forwards; }
.scene.exiting  { animation: sOut 360ms var(--ease) forwards; }
/* card-shuffle: scrolls vertically */
@keyframes sIn  { from{opacity:0;transform:translateY(44px) scale(0.97);filter:blur(5px)} to{opacity:1;transform:none;filter:none} }
@keyframes sOut { from{opacity:1;transform:none;filter:none} to{opacity:0;transform:translateY(-36px) scale(0.98);filter:blur(4px)} }

/* ── BRAND BLOCK — scene 1 only ──────────────────────────────── */
.brand-block { text-align:center; margin-bottom:52px; user-select:none; overflow: visible; }
.brand-name {
  font-family: var(--f-head);
  font-weight: 700;
  /* FIX 4 — wider proportions for Playfair Display */
  font-size: clamp(58px, 10vw, 108px);
  line-height: 1.2;
  letter-spacing: -0.02em;
  background: linear-gradient(140deg, var(--amber-pale) 0%, var(--amber) 45%, var(--amber-dim) 75%, var(--amber) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 50px rgba(245,166,35,0.22));
  display: block;
}
.brand-tagline {
  margin-top: 10px;
  font-family: var(--f-body);
  font-weight: 300;
  font-size: clamp(12px, 1.8vw, 15px);
  color: var(--grey);
  letter-spacing: 0.06em;
  display: block;
}

/* ── SHARED INPUT ───────────────────────────────────────────── */
.field-wrap { position:relative; width:100%; max-width:520px; }
.field-label {
  display:block; font-family:var(--f-body); font-size:10px; font-weight:500;
  letter-spacing:0.22em; text-transform:uppercase; color:var(--amber-dim); margin-bottom:10px;
}
.text-input {
  width:100%; background:rgba(22,25,40,0.75);
  border:1px solid rgba(245,166,35,0.18); border-bottom-color:rgba(245,166,35,0.4);
  color:var(--warm-white); font-family:var(--f-body); font-size:15px; font-weight:300;
  padding:15px 42px 15px 16px; outline:none; appearance:none; letter-spacing:0.01em;
  transition: border-color 220ms ease, box-shadow 220ms ease, background 220ms ease;
}
.text-input::placeholder { color:var(--grey-2); animation:phPulse 3s ease-in-out infinite; }
.text-input:focus {
  border-color:var(--amber);
  box-shadow:0 0 0 1px rgba(245,166,35,0.18), 0 4px 24px rgba(245,166,35,0.1);
  background:rgba(26,30,50,0.9);
}
.text-input:focus-visible { outline:none; }
@keyframes phPulse { 0%,100%{opacity:0.45} 50%{opacity:1} }
.field-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--grey-2); pointer-events:none; }


/* ── SCENE 1 ─────────────────────────────────────────────────── */
#scene-1 { padding:60px 24px; gap:0; }

#searchDropdown {
  position:absolute; top:calc(100% + 2px); left:0; right:0;
  background:var(--navy-3); border:1px solid rgba(245,166,35,0.18); border-top:none;
  z-index:100; max-height:280px; overflow-y:auto; display:none;
}
#searchDropdown.open { display:block; }
.dd-item {
  padding:12px 16px; cursor:pointer; border-bottom:1px solid rgba(245,166,35,0.05);
  opacity:0; transform:translateY(6px); animation:ddIn 180ms ease forwards;
  transition:background 150ms ease;
}
.dd-item:last-child { border-bottom:none; }
.dd-item:hover { background:rgba(245,166,35,0.07); }
.dd-item:focus-visible { outline:1px solid var(--amber); outline-offset:-1px; }
.dd-title { font-family:var(--f-body); font-size:13px; font-weight:400; color:var(--warm-white); }
.dd-sub   { font-family:var(--f-body); font-size:11px; font-weight:300; color:var(--grey); margin-top:2px; }
.dd-empty { padding:14px 16px; font-family:var(--f-body); font-size:13px; color:var(--grey-2); }
@keyframes ddIn { to{opacity:1;transform:none} }

/* ── SCENE 2 ─────────────────────────────────────────────────── */
#scene-2 { padding:80px 24px 60px; gap:0; }


.s2-song-context {
  font-family:var(--f-body); font-size:11px; font-weight:300;
  font-style:italic; color:var(--grey);
  margin-bottom:14px; display:block;
}

.s2-wrap { width:100%; max-width:520px; display:flex; flex-direction:column; align-items:flex-start; }

.chips-label {
  font-family:var(--f-body); font-size:10px; font-weight:500;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--grey-2); margin:18px 0 8px; display:block;
}
.chips-wrap {
  width:100%; display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;
  scrollbar-width:none; -ms-overflow-style:none;
  mask-image:linear-gradient(90deg,transparent 0%,black 4%,black 88%,transparent 100%);
}
.chips-wrap::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; background:transparent;
  border:1px solid rgba(245,166,35,0.22); color:var(--grey);
  font-family:var(--f-body); font-size:11px; font-weight:300;
  letter-spacing:0.03em; padding:6px 12px; cursor:pointer; white-space:nowrap;
  transition: border-color 160ms, color 160ms, background 160ms;
}
.chip:hover { border-color:var(--amber); color:var(--amber); background:rgba(245,166,35,0.06); }
.chip:focus-visible { outline:1px solid var(--amber); outline-offset:2px; }

/* FIX 2 — "Find My Settings" button redesigned to match ghost-rectangle design language */
#generateBtn {
  margin-top:32px; width:100%;
  background: transparent;
  border:1px solid var(--amber);
  color:var(--amber);
  font-family:var(--f-body); font-size:13px; font-weight:400;
  letter-spacing:0.12em; text-transform:uppercase; padding:16px 24px;
  cursor:pointer; position:relative;
  border-radius:0;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition: background 200ms ease, color 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
}
#generateBtn:hover {
  background: rgba(245,166,35,0.08);
  color: var(--amber-pale);
  border-color: var(--amber-pale);
  box-shadow: 0 0 28px rgba(245,166,35,0.12);
}
#generateBtn:active {
  transform: translateY(0);
  box-shadow: 0 0 12px rgba(245,166,35,0.1);
}
#generateBtn:disabled { opacity:0.35; cursor:not-allowed; pointer-events:none; }
#generateBtn:focus-visible { outline:1px solid var(--amber); outline-offset:3px; }

#errorBox { width:100%; max-width:520px; margin-top:14px; }
.error-box {
  display:flex; gap:10px; align-items:flex-start;
  border-left:2px solid var(--error); padding:11px 14px;
  background:rgba(224,85,85,0.07);
  font-family:var(--f-body); font-size:13px; color:rgba(240,234,216,0.7); line-height:1.5;
}
.error-box span { color:var(--error); flex-shrink:0; }


/* ── SCENE 3 ─────────────────────────────────────────────────── */
#scene-3 { padding:24px 0 0; justify-content:flex-start; align-items:stretch; }
#results-inner {
  flex:1; width:100%; max-width:1320px; margin:0 auto;
  display:flex; flex-direction:column; height:calc(100vh - 24px); padding:0 16px;
}

#results-meta {
  padding:12px 4px 10px;
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  border-bottom:1px solid rgba(245,166,35,0.1); flex-shrink:0;
}
/* FIX 4 — rm-title larger size */
.rm-title {
  font-family:var(--f-head); font-weight:400; font-style:italic;
  font-size:clamp(18px,2.2vw,24px); color:var(--warm-white); letter-spacing:-0.01em; margin-right:4px;
}
.rm-pill {
  font-family:var(--f-body); font-size:11px; font-weight:400; letter-spacing:0.04em;
  color:var(--grey); padding:3px 9px;
  border:1px solid rgba(245,166,35,0.14); background:rgba(245,166,35,0.04);
}

/* FIX 3 — Cards: glass-float treatment */
#presets-grid {
  flex:1; display:flex; gap:4px; background:transparent;
  overflow:hidden; min-height:0;
}
.preset-card {
  flex:1; display:flex; flex-direction:column;
  background:rgba(20, 23, 38, 0.55);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(245,166,35,0.10);
  border-top:1px solid rgba(245,166,35,0.20);
  box-shadow: 0 8px 40px rgba(0,0,0,0.45), 0 1px 0 rgba(245,166,35,0.07) inset;
  min-width:0; overflow:hidden;
}
.card-header {
  padding:14px 18px 11px;
  background:rgba(245,166,35,0.03); flex-shrink:0;
}
.card-ordinal {
  font-family:var(--f-body); font-size:9px; font-weight:500;
  letter-spacing:0.3em; text-transform:uppercase; color:var(--grey-2); margin-bottom:3px;
}
/* FIX 4 — card-name light italic */
.card-name {
  font-family:var(--f-head); font-weight:300; font-style:italic;
  font-size:clamp(14px,1.5vw,18px); color:var(--warm-white); line-height:1.2; margin-bottom:3px;
}
.card-desc {
  font-family:var(--f-body); font-size:11px; font-weight:300; color:var(--grey); line-height:1.4;
}

/* card body — NO scroll */
.card-body {
  flex:1; padding:10px 18px 0; overflow:hidden;
  display:flex; flex-direction:column; gap:9px;
}
.settings-group { display:flex; flex-direction:column; }
.sg-title {
  font-family:var(--f-body); font-size:9px; font-weight:500;
  letter-spacing:0.26em; text-transform:uppercase; color:var(--amber-dim);
  padding-bottom:3px; border-bottom:1px solid rgba(245,166,35,0.08); margin-bottom:3px;
}
.setting-row { display:flex; align-items:baseline; padding:2.5px 0; gap:3px; }
.sr-key  { font-family:var(--f-body); font-size:11px; font-weight:300; color:var(--grey); white-space:nowrap; flex-shrink:0; }
.sr-num  { font-family:var(--f-body); font-size:10px; font-weight:300; color:var(--grey-2); margin-left:3px; white-space:nowrap; flex-shrink:0; }
.sr-dots { flex:1; border-bottom:1px dotted rgba(245,166,35,0.12); margin:0 5px 2px; min-width:10px; }
.sr-val  { font-family:var(--f-body); font-size:11px; font-weight:400; color:var(--warm-white); text-align:right; white-space:nowrap; }
.tips-text { font-family:var(--f-body); font-size:11px; font-weight:300; color:var(--grey); line-height:1.5; }

.card-footer {
  padding:9px 18px 11px; border-top:1px solid rgba(245,166,35,0.08); flex-shrink:0; margin-top:auto;
}
.btn-copy {
  width:100%; background:transparent; border:1px solid rgba(245,166,35,0.2); color:var(--grey);
  font-family:var(--f-body); font-size:10px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase;
  padding:9px 14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px;
  transition: border-color 180ms, color 180ms, background 180ms;
}
.btn-copy:hover { border-color:var(--amber); color:var(--amber); background:rgba(245,166,35,0.04); }
.btn-copy.copied { border-color:var(--success); color:var(--success); }
.btn-copy:focus-visible { outline:1px solid var(--amber); outline-offset:2px; }

#s3-footer {
  text-align:center; padding:6px;
  font-family:var(--f-body); font-size:9px; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--grey-3); flex-shrink:0;
}

/* ── LOADING ─────────────────────────────────────────────────── */
#loading-overlay {
  position:fixed; inset:0; z-index:50;
  background:rgba(13,15,26,0.92); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  display:none; align-items:center; justify-content:center; flex-direction:column; gap:22px;
}
#loading-overlay.active { display:flex; }
.loader-ring { width:52px; height:52px; }
.loader-ring svg { animation:spin 1.6s linear infinite; width:100%; height:100%; }
@keyframes spin { to{transform:rotate(360deg)} }
/* FIX 4 — loading text uses Cormorant Garamond italic at 15px */
.loading-text {
  font-family:var(--f-head); font-style:italic; font-size:15px; color:var(--grey); letter-spacing:0.08em;
  animation:tFade 2s ease-in-out infinite;
}
@keyframes tFade { 0%,100%{opacity:0.35} 50%{opacity:1} }

/* ── MOBILE ──────────────────────────────────────────────────── */
@media (max-width:768px) {
  #presets-grid { flex-direction:row; overflow-x:auto; overflow-y:hidden; scroll-snap-type:x mandatory; background:transparent; gap:0; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  #presets-grid::-webkit-scrollbar { display:none; }
  /* FIX 3 — cards float inside the viewport on mobile */
  .preset-card { min-width:100%; scroll-snap-align:start; margin:0 12px; }
  #carousel-dots { display:flex; justify-content:center; gap:6px; padding:8px; flex-shrink:0; }
  .carousel-dot { width:18px; height:2px; background:rgba(245,166,35,0.2); transition:background 200ms,width 200ms; }
  .carousel-dot.active { background:var(--amber); width:28px; }
}
#carousel-dots { display:none; }
@media (min-width:769px) { #carousel-dots { display:none !important; } }

button { cursor:pointer; }
*:focus-visible { outline:1px solid var(--amber); outline-offset:3px; }
</style>
</head>
<body>

<div id="bg" aria-hidden="true">
  <div id="bg-base"></div><div id="bg-grid"></div><div id="bg-vignette"></div><div id="bg-noise"></div>
</div>


<div id="stage">

  
  <!-- Scene 1: Search -->
  <section id="scene-1" class="scene active" aria-label="Search for a song">
    <div class="brand-block">
      <span class="brand-name">KeyMatch</span>
      <span class="brand-tagline">Find the perfect settings for your keyboard</span>
    </div>
    <div class="field-wrap">
      <label for="songSearch" class="field-label">Song Title or Artist</label>
      <div style="position:relative">
        <input id="songSearch" class="text-input" type="text" autocomplete="off" spellcheck="false"
          placeholder="e.g. Clair de Lune, Bohemian Rhapsody…"
          aria-label="Search for a song" aria-autocomplete="list" aria-controls="searchDropdown" aria-expanded="false">
        <svg class="field-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
        </svg>
        <div id="searchDropdown" role="listbox" aria-label="Search results"></div>
      </div>
    </div>
  </section>

  <!-- FIX 1 — Scene 2: brand block removed; back button + song context added -->
  <section id="scene-2" class="scene" aria-label="Enter your keyboard model">
        <div class="s2-wrap">
            <span class="s2-song-context" id="s2-song-context"></span>
      <label for="kbInput" class="field-label">Your Keyboard Model</label>
      <input id="kbInput" class="text-input" type="text" autocomplete="off" spellcheck="false"
        placeholder="e.g. Yamaha PSR-E373, Casio CT-X700…" aria-label="Keyboard model"
        style="padding-right:16px">

      <span class="chips-label">Quick Select</span>
      <div class="chips-wrap" role="group" aria-label="Common keyboard models">
        <button class="chip" data-model="Yamaha PSR-E373">Yamaha PSR-E373</button>
        <button class="chip" data-model="Yamaha PSR-EW310">Yamaha PSR-EW310</button>
        <button class="chip" data-model="Casio CT-X700">Casio CT-X700</button>
        <button class="chip" data-model="Casio CT-X870IN">Casio CT-X870IN</button>
        <button class="chip" data-model="Roland E-X30">Roland E-X30</button>
        <button class="chip" data-model="Korg EK-50">Korg EK-50</button>
        <button class="chip" data-model="Yamaha DGX-670">Yamaha DGX-670</button>
        <button class="chip" data-model="Casio PX-S3100">Casio PX-S3100</button>
        <button class="chip" data-model="Roland FP-30X">Roland FP-30X</button>
      </div>

      <!-- FIX 2 — ghost-rectangle button with arrow glyph -->
      <button id="generateBtn" aria-label="Generate keyboard settings">
        <span>Find My Settings</span>
        <span aria-hidden="true">→</span>
      </button>
    </div>
    <div id="errorBox" aria-live="polite"></div>
  </section>

  <!-- Scene 3: Results -->
  <section id="scene-3" class="scene" aria-label="Preset results">
    <div id="results-inner">
      <div id="results-meta">
        <div class="rm-title" id="rm-title"></div>
        <div id="rm-pills" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"></div>
      </div>
      <div id="presets-grid" role="list" aria-label="Keyboard presets"></div>
      <div id="carousel-dots" aria-hidden="true"></div>
    </div>
  </section>

</div>

<!-- Loading -->
<div id="loading-overlay" role="status" aria-label="Generating settings">
  <div class="loader-ring">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="20" stroke="rgba(245,166,35,0.1)" stroke-width="1.5"/>
      <path d="M26 6 A20 20 0 0 1 46 26" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="loading-text" id="loading-text">Analysing song…</div>
</div>

<script>
'use strict';

const WORKER_URL = 'https://keymatch-api.shaurya-chopra.workers.dev/api/gemini';

let selectedSong  = null;
let currentScene  = 1;
let searchTimer   = null;
let loadingInterval = null, loadingMsgIdx = 0;
const loadingMsgs = ['Analysing song…','Consulting the instrument…','Composing your presets…','Almost there…'];

// ── Scenes ────────────────────────────────────────────────────
function goToScene(n) {
  if (n === currentScene) return;
  const prev = document.getElementById(`scene-${currentScene}`);
  const next = document.getElementById(`scene-${n}`);
  prev.classList.remove('active');
  prev.classList.add('exiting');
  prev.addEventListener('animationend', () => prev.classList.remove('exiting'), { once: true });
  next.classList.add('entering');
  next.addEventListener('animationend', () => { next.classList.remove('entering'); next.classList.add('active'); }, { once: true });
  currentScene = n;
}

function resetToScene1() {
  selectedSong = null;
  document.getElementById('songSearch').value  = '';
  document.getElementById('kbInput').value     = '';
  clearError();
  document.getElementById('presets-grid').innerHTML = '';
  document.getElementById('rm-title').textContent = '';
  document.getElementById('rm-pills').innerHTML = '';
  document.getElementById('carousel-dots').innerHTML = '';
  goToScene(1);
  setTimeout(() => document.getElementById('songSearch').focus(), 450);
}

// ── API ───────────────────────────────────────────────────────
async function callGemini(prompt, system) {
  const res = await fetch(WORKER_URL, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, system })
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`API error ${res.status}: ${t.slice(0,120)}`); }
  const d = await res.json();
  return d.response || d.text || d.content || JSON.stringify(d);
}

// ── Song search ───────────────────────────────────────────────
async function searchSongs(q) {
  if (!q || q.length < 2) { closeDropdown(); return; }
  const sys = `Music database. Return ONLY raw JSON array, no markdown: [{"title":"...","artist":"...","year":2020,"genre":"Pop"}] Max 6 real songs.`;
  try {
    const raw = await callGemini(`Songs matching: "${q}"`, sys);
    const s = raw.indexOf('['), e = raw.lastIndexOf(']');
    if (s === -1) return;
    renderDropdown(JSON.parse(raw.slice(s, e+1)));
  } catch { closeDropdown(); }
}

function renderDropdown(songs) {
  const dd = document.getElementById('searchDropdown');
  const inp = document.getElementById('songSearch');
  if (!songs?.length) {
    dd.innerHTML = `<div class="dd-empty">No results found</div>`;
  } else {
    dd.innerHTML = songs.map((s,i) => `
      <div class="dd-item" role="option" tabindex="0" style="animation-delay:${i*32}ms"
        data-title="${escHtml(s.title)}" data-artist="${escHtml(s.artist)}"
        data-year="${s.year||''}" data-genre="${escHtml(s.genre||'')}">
        <div class="dd-title">${escHtml(s.title)}</div>
        <div class="dd-sub">${escHtml(s.artist)}${s.year?' · '+s.year:''}</div>
      </div>`).join('');
    dd.querySelectorAll('.dd-item').forEach(el => {
      el.addEventListener('click', () => selectSong(el));
      el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();selectSong(el);} });
    });
  }
  dd.classList.add('open');
  inp.setAttribute('aria-expanded','true');
}

function selectSong(el) {
  selectedSong = { title:el.dataset.title, artist:el.dataset.artist, year:el.dataset.year, genre:el.dataset.genre };
  document.getElementById('songSearch').value = `${selectedSong.title} — ${selectedSong.artist}`;
  document.getElementById('s2-song-context').textContent = `${selectedSong.title} — ${selectedSong.artist}`;
  closeDropdown();

  // FIX 1 — brand exit animation: wordmark flies up, anchor fades in
  const brandBlock = document.querySelector('#scene-1 .brand-block');
  brandBlock.classList.remove('brand-block--enter');
  brandBlock.classList.add('brand-block--exit');
  brandBlock.addEventListener('animationend', () => {
    brandBlock.classList.remove('brand-block--exit', 'brand-block--enter');
  }, { once: true });
  setTimeout(() => { document.getElementById('brand-anchor').classList.add('visible'); }, 20);

  goToScene(2);
  setTimeout(() => document.getElementById('kbInput').focus(), 450);
}

function closeDropdown() {
  document.getElementById('searchDropdown').classList.remove('open');
  document.getElementById('songSearch').setAttribute('aria-expanded','false');
}

// ── Generate ──────────────────────────────────────────────────
async function generateSettings() {
  const kb = document.getElementById('kbInput').value.trim();
  if (!selectedSong) { showError('Please search and select a song first.'); return; }
  if (!kb)           { showError('Please enter your keyboard model.'); return; }
  clearError(); setLoading(true);

  const system = `You are a world-class keyboard technician with expert knowledge of Yamaha PSR/DGX, Casio CT-X/WK/PX, Roland E-X/FA, Korg EK/Pa and all major keyboard brands.

Generate keyboard settings to make the given song sound as close to its original as possible on the specific model.

CRITICAL: Voice numbers and rhythm style numbers MUST be the actual numbers from the official manual of the exact keyboard model specified. Look up the manual if needed. Do not invent or guess numbers.

Return ONLY raw JSON. No markdown. No backticks. No explanation.

{
  "song_analysis":{"title":string,"artist":string,"genre":string,"tempo_bpm":number,"key":string,"mood":string},
  "keyboard_model":string,
  "presets":[{
    "name":string,"style":string,"description":string,
    "voice":{"main_voice":string,"voice_number":string,"octave":string,"transpose":string},
    "dual":{"enabled":boolean,"voice":string,"voice_number":string,"volume":number},
    "effects":{"reverb_type":string,"reverb_depth":number,"chorus_type":string,"chorus_depth":number},
    "rhythm":{"style":string,"style_number":string,"tempo":number,"intro":string,"fill":string},
    "extra_tips":string
  }]
}

Provide exactly 3 presets with different approaches. Voice and rhythm numbers must be accurate for the exact model.`;

  const prompt = `Song: "${selectedSong.title}" by ${selectedSong.artist} (${selectedSong.year}, ${selectedSong.genre||'Pop'})
Keyboard: ${kb}
Generate 3 complete presets with voice and rhythm numbers accurate for the ${kb}.`;

  try {
    const raw = await callGemini(prompt, system);
    const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
    if (s===-1||e===-1) throw new Error('Could not parse response. Please try again.');
    renderResults(JSON.parse(raw.slice(s,e+1)));
  } catch(err) {
    showError(err.message);
  } finally {
    setLoading(false);
  }
}

// ── Render results ────────────────────────────────────────────
/**
 * Renders the results page with song metadata and preset cards
 * @param {Object} data - Response from Gemini API containing song analysis and presets
 */
function renderResults(data) {
  // Extract song analysis and preset data from API response
  const song = data.song_analysis || {};
  const presets = data.presets || [];
  const roms = ['I','II','III'];

  // Update results header with song information
  document.getElementById('rm-title').textContent = song.title || selectedSong.title;
  
  // Generate meta pills for song characteristics (mood, key, genre)
  // Note: Tempo is excluded since it's consistent across all presets
  document.getElementById('rm-pills').innerHTML = [
    song.mood      ? `<span class="rm-pill">${escHtml(song.mood)}</span>` : '',
    song.key       ? `<span class="rm-pill">Key of ${escHtml(song.key)}</span>` : '',
    song.genre     ? `<span class="rm-pill">${escHtml(song.genre)}</span>` : '',
  ].filter(Boolean).join('');

  // Render preset cards dynamically based on API response
  document.getElementById('presets-grid').innerHTML = presets.map((p,i) => buildCard(p,i,roms)).join('');

  // Add click event listeners to all copy buttons
  document.querySelectorAll('.btn-copy').forEach(btn =>
    btn.addEventListener('click', () => copyCard(btn, parseInt(btn.dataset.idx)))
  );

  // Setup carousel dots for mobile navigation
  const dotsEl = document.getElementById('carousel-dots');
  dotsEl.innerHTML = presets.map((_,i) => `<div class="carousel-dot${i===0?' active':''}"></div>`).join('');
  
  // Enable carousel dot navigation on mobile devices
  if (window.innerWidth <= 768) {
    const grid = document.getElementById('presets-grid');
    grid.addEventListener('scroll', () => {
      const idx = Math.round(grid.scrollLeft/grid.offsetWidth);
      dotsEl.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active',i===idx));
    }, { passive:true });
  }

  // Navigate to results scene
  goToScene(3);
}

function buildCard(p, i, roms) {
  // Note: Voice numbers removed due to accuracy issues
  // Voice names and settings are preserved for usability

  return `
  <div class="preset-card" role="listitem">
    <div class="card-header">
      <div class="card-ordinal">Preset ${roms[i]||i+1}</div>
      <div class="card-name">${escHtml(p.name||'')}</div>
      <div class="card-desc">${escHtml(p.description||p.style||'')}</div>
    </div>
    <div class="card-body">

      <div class="settings-group">
        <div class="sg-title">Voice</div>
        <div class="setting-row">
          <span class="sr-key">Main Voice</span>
          <span class="sr-dots" aria-hidden="true"></span>
          <span class="sr-val">${escHtml(p.voice?.main_voice||'—')}</span>
        </div>
        ${p.voice?.octave    ? rowS('Octave',    p.voice.octave)    : ''}
        ${p.voice?.transpose ? rowS('Transpose', p.voice.transpose) : ''}
      </div>

      ${p.dual?.enabled ? `
      <div class="settings-group">
        <div class="sg-title">Dual Voice</div>
        <div class="setting-row">
          <span class="sr-key">Voice</span>
          <span class="sr-dots" aria-hidden="true"></span>
          <span class="sr-val">${escHtml(p.dual?.voice||'—')}</span>
        </div>
        ${rowS('Volume', p.dual?.volume ?? '—')}
      </div>` : ''}

      <div class="settings-group">
        <div class="sg-title">Rhythm &amp; Tempo</div>
        <div class="setting-row">
          <span class="sr-key">Style</span>
          <span class="sr-dots" aria-hidden="true"></span>
          <span class="sr-val">${escHtml(p.rhythm?.style||'—')}</span>
        </div>
        ${rowS('Tempo',   p.rhythm?.tempo ? p.rhythm.tempo+' BPM' : '—')}
        ${rowS('Intro',   p.rhythm?.intro)}
        ${rowS('Fill-in', p.rhythm?.fill)}
      </div>

      <div class="settings-group">
        <div class="sg-title">Effects</div>
        ${rowS('Reverb', p.effects?.reverb_type
            ? p.effects.reverb_type + (p.effects.reverb_depth !== undefined ? ' · '+p.effects.reverb_depth : '')
            : '—')}
        ${rowS('Chorus', p.effects?.chorus_type
            ? p.effects.chorus_type + (p.effects.chorus_depth !== undefined ? ' · '+p.effects.chorus_depth : '')
            : '—')}
      </div>

      ${p.extra_tips ? `
      <div class="settings-group">
        <div class="sg-title">Tips</div>
        <div class="tips-text">${escHtml(p.extra_tips)}</div>
      </div>` : ''}

    </div>
    <div class="card-footer">
      <button class="btn-copy" data-idx="${i}" aria-label="Copy preset ${roms[i]||i+1}">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        Copy Settings
      </button>
    </div>
  </div>`;
}

function rowS(label, value) {
  const v = (value !== undefined && value !== null && value !== '') ? value : '—';
  return `<div class="setting-row">
    <span class="sr-key">${escHtml(label)}</span>
    <span class="sr-dots" aria-hidden="true"></span>
    <span class="sr-val">${escHtml(String(v))}</span>
  </div>`;
}

function copyCard(btn, idx) {
  const cards = document.querySelectorAll('.preset-card');
  if (!cards[idx]) return;
  let text = `KeyMatch — ${selectedSong?.title} (${selectedSong?.artist})\nPreset ${idx+1}\n${'─'.repeat(36)}\n`;
  cards[idx].querySelectorAll('.settings-group').forEach(g => {
    text += `\n[${g.querySelector('.sg-title')?.textContent||''}]\n`;
    g.querySelectorAll('.setting-row').forEach(r => {
      const k   = r.querySelector('.sr-key')?.textContent?.trim();
      const num = r.querySelector('.sr-num')?.textContent?.trim();
      const v   = r.querySelector('.sr-val')?.textContent?.trim();
      text += `  ${k}${num?' ('+num+')':''}: ${v}\n`;
    });
    const tips = g.querySelector('.tips-text');
    if (tips) text += `  ${tips.textContent.trim()}\n`;
  });
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.textContent = 'Copied ✓';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> Copy Settings`;
    }, 2500);
  });
}

function setLoading(on) {
  document.getElementById('loading-overlay').classList.toggle('active', on);
  document.getElementById('generateBtn').disabled = on;
  if (on) {
    loadingMsgIdx = 0;
    document.getElementById('loading-text').textContent = loadingMsgs[0];
    loadingInterval = setInterval(() => {
      loadingMsgIdx = (loadingMsgIdx+1) % loadingMsgs.length;
      document.getElementById('loading-text').textContent = loadingMsgs[loadingMsgIdx];
    }, 2200);
  } else { clearInterval(loadingInterval); }
}
function showError(msg) {
  const b = document.getElementById('errorBox');
  b.innerHTML = `<div class="error-box"><span>⚠</span><div>${escHtml(msg)}</div></div>`;
  b.style.display = 'block';
}
function clearError() { const b=document.getElementById('errorBox'); b.style.display='none'; b.innerHTML=''; }
function escHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Events ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('songSearch');

  inp.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = inp.value.trim();
    if (q.length < 2) { closeDropdown(); return; }
    searchTimer = setTimeout(() => searchSongs(q), 420);
  });

  document.addEventListener('click', e => { if (!e.target.closest('#scene-1')) closeDropdown(); });

  inp.addEventListener('keydown', e => {
    const items = document.querySelectorAll('.dd-item');
    if (!document.getElementById('searchDropdown').classList.contains('open')||!items.length) return;
    if (e.key==='ArrowDown'){e.preventDefault();items[0].focus();}
    if (e.key==='Escape'){closeDropdown();inp.focus();}
  });
  document.getElementById('searchDropdown').addEventListener('keydown', e => {
    const items=[...document.querySelectorAll('.dd-item')];
    const idx=items.indexOf(document.activeElement);
    if(e.key==='ArrowDown'){e.preventDefault();items[Math.min(idx+1,items.length-1)]?.focus();}
    if(e.key==='ArrowUp'){e.preventDefault();idx===0?inp.focus():items[idx-1]?.focus();}
    if(e.key==='Escape'){closeDropdown();inp.focus();}
  });

  document.querySelectorAll('.chip').forEach(c =>
    c.addEventListener('click', () => document.getElementById('kbInput').value = c.dataset.model)
  );

  document.getElementById('generateBtn').addEventListener('click', generateSettings);
  document.getElementById('kbInput').addEventListener('keydown', e => { if(e.key==='Enter') generateSettings(); });
});
</script>
